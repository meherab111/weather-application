<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Welcome to Real Time Sky application, where you can check real-time weather information"
    />
    <meta
      name="keywords"
      content="Real, Time, Application, Sky, Search, City, App, Feels, Like, Humidity, Wind, Pressure"
    />
    <meta name="robots" content="index, follow" />
    <link
      rel="shortcut icon"
      href="images/weather-app.webp"
      type="image/x-icon"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&family=Fira+Code:wght@300..700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Quicksand:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
      integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css" />

    <title>Real Time Sky App: Check Real Time Weather Info.</title>
  </head>

  <body>
    <section class="main_div">
      <!-- searching functionality -->

      <div class="search_div">
        <form class="input_field_form">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input
            type="text"
            class="input_field"
            maxlength="12"
            placeholder="Search City..."
          />
        </form>
      </div>

      <!-- weather main body functionality -->

      <div class="weather_body_div">
        <h1 class="weather_address"></h1>
        <p class="weather_date"></p>
        <div class="weather_icon_div"></div>
        <p class="weather_temp"></p>

        <div class="weather_minmax_div">
          <p class="weather_min"></p>
          <p class="weather_max"></p>
        </div>
      </div>

      <!-- weather extra info functionality -->

      <div class="weather_extra_info_div">
        <div class="info_cards1_div">
          <div class="card1_div">
            <i class="fa-solid fa-temperature-three-quarters"></i>
            <div class="feels_like_div">
              <p>Feels Like</p>
              <p class="weather_feels_like"></p>
            </div>
          </div>
          <!-- ---------------------------- -->
          <div class="card2_div">
            <i class="fa-solid fa-droplet"></i>
            <div class="humidity_div">
              <p>Humidity</p>
              <p class="weather_humidity"></p>
            </div>
          </div>
        </div>
        <div class="info_cards2_div">
          <div class="card3_div">
            <i class="fa-solid fa-wind"></i>
            <div class="wind_div">
              <p>Wind</p>
              <p class="weather_wind"></p>
            </div>
          </div>
          <!-- ---------------------------- -->
          <div class="card4_div">
            <i class="fa-solid fa-gauge-high"></i>
            <div class="pressure_div">
              <p>Pressure</p>
              <p class="weather_pressure"></p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
